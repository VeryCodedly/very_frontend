<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline | VeryCodedly</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Geist Mono', monospace;
      background: black;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Central wrapper – limits max width and keeps everything together */
    .offline-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Flex container – side by side on desktop, stacked on mobile */
    .offline-container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
      justify-content: center;
    }

    /* Left side – text content */
    .offline-content {
      flex: 1;
      max-width: 450px;
      text-align: center;
    }

    /* Badge (green bar + text) */
    .badge {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .badge-bar {
      width: 5px;
      height: 28px;
      background-color: #A3FF52;
      border-radius: 3px;
    }

    .badge-text {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: #9ca3af;
    }

    /* Title */
    .offline-title {
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1.2;
      color: white;
      margin-bottom: 1.5rem;
    }

    .offline-title span {
      background: #A3FF52;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    @media (min-width: 640px) {
      .offline-title {
        font-size: 3rem;
      }
    }

    /* Retry button */
    .retry-btn {
      padding: 0.7rem 2rem;
      background: #A3FF52;
      color: black;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(154, 230, 0, 0.3);
      width: auto;
      min-width: 140px;
      margin: 0 auto;
    }

    .retry-btn:hover {
      background: #9AE600;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(154, 230, 0, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    /* Right side – mascot image */
    .offline-mascot {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 500px;
    }

    .offline-mascot img {
      width: 100%;
      height: auto;
      max-height: 550px;
      object-fit: contain;
      border-radius: 20px;
      display: block;
    }

    /* adjust image size on smaller screens */
    @media (min-width: 640px) {
      .offline-container {
        flex-direction: row;
        gap: 3rem;
      }
      
      /* Add these lines */
      .offline-content {
        text-align: left;
      }
      
      .badge {
        justify-content: flex-start;
      }
      
      .retry-btn {
        margin: 0;
      }
  }
  </style>
</head>
<body>
  <div class="offline-wrapper">
    <div class="offline-container">
      <!-- Left side: text content -->
      <div class="offline-content">
        <div class="badge">
          <div class="badge-bar"></div>
          <div class="badge-text">Nothing's coming through.</div>
        </div>
        <h1 class="offline-title">
          You're <span>Offline.</span>
        </h1>
        <button class="retry-btn" onclick="retryConnection()">Retry</button>
      </div>

      <!-- Right side: mascot image (shelly-off.jpg) -->
      <div class="offline-mascot">
        <img src="/images/shelly-off.jpg" alt="SHELLy – VeryCodedly mascot" />
      </div>
    </div>
  </div>

  <script>
    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      btn.textContent = 'Checking…';
      btn.disabled = true;

      fetch('/manifest.json', { cache: 'no-store' })
        .then(() => location.reload())
        .catch(() => {
          btn.textContent = 'Still offline';
          setTimeout(() => {
            btn.textContent = 'Retry';
            btn.disabled = false;
          }, 1500);
        });
    }

    // Auto-reload when back online
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 10000);
  </script>
</body>
</html>
